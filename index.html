    <style>
        /* 觀察清單收納動畫 */
        #watchBody {
            transition: max-height 0.3s ease-out, opacity 0.2s ease-in;
            max-height: 2000px; 
            overflow: hidden;
        }
        #watchBody.collapsed {
            max-height: 0;
            opacity: 0;
        }

        /* 基礎優化：防止選取文字，模擬原生 APP 感 */
        * { 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
            user-select: none;
        }
        input { user-select: auto; }

        html { height: 100%; overflow: hidden; background: #f4f7f6; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-top: calc(env(safe-area-inset-top) + 5vh);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* 標籤顏色 */
        .tab-active-C { background-color: #007bff !important; color: white !important; }
        .tab-active-L2PM { background-color: #28a745 !important; color: white !important; }
        .tab-active-SFI { background-color: #fd7e14 !important; color: white !important; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 圖示 */
        .icon-trash { display: inline-block; width: 18px; height: 18px; background-color: currentColor; -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M3 6h18v2H3V6m2 3h14v13a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V9m3 3v7h2v-7H8m4 0v7h2v-7h-2m4 0v7h2v-7h-2m4 0v7h2v-7h-2M9 4l1-1h4l1 1h5v2H4V4h5z'/></svg>") no-repeat center; }
        .icon-check { display: inline-block; width: 22px; height: 22px; background-color: currentColor; -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z'/></svg>") no-repeat center; }
        
        #customAlert { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3000; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 85%; max-width: 320px; text-align: center; border: 1px solid #eee; }
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.3); z-index: 1000; 
        }
        
        /* 計算機：置於中下方且居中 */
        #numKeypad { 
            visibility: hidden;
            opacity: 0;
            position: fixed; 
            bottom: 10%; 
            left: 50%;
            width: 90%; 
            max-width: 350px;
            background: #e5e7eb; 
            z-index: 2000; 
            padding: 15px; 
            border-radius: 24px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.3); 
            transform: translate(-50%, 20px) scale(0.95);
            transition: all 0.25s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            will-change: transform, opacity;
        }
        #numKeypad.show {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, 0) scale(1);
        }

        .key-btn { background: white; border-radius: 12px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; color: #374151; box-shadow: 0 2px 0 #d1d5db; }
        .key-btn:active { background: #f3f4f6; transform: translateY(1px); box-shadow: none; }
        .key-op { background: #f97316; color: white; }
        .key-confirm { background: #2563eb; color: white; }
        .key-clear { background: #94a3b8; color: white; }

        .item-code-badge { font-family: monospace; background-color: #dbeafe; color: #1d4ed8; padding: 1px 6px; border-radius: 4px; font-weight: 800; font-size: 11px; display: inline-block; }
        .watch-locator-badge { font-family: monospace; background-color: #fef08a; color: #854d0e; padding: 1px 6px; border-radius: 4px; font-weight: 800; font-size: 11px; display: inline-block; }
        .filter-btn-active { background-color: white !important; color: #dc2626 !important; font-weight: 900 !important; }

        /* 系統管理收納動畫 - 流暢優化版 */
        #mgmtBody {
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-in-out, margin-top 0.4s ease;
            max-height: 300px;
            opacity: 1;
            overflow: hidden;
        }
        #mgmtBody.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0 !important;
        }
    </style>
</head>

    <script>
        // 🚨 填入你發佈成 CSV 嘅 Google Sheet 連結
        const CLOUD_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS3lVUR7qTqE8gKKNHIPemXDNVmji9dBzs3POa3CZX4aXhspqJLAoNAqXwQt_g3-XLqtNOejRqWV1W_/pub?output=csv"; 

        let currentPS = 0; 
        let isWatchlistExpanded = false;
        
        // 🚨 雲端化：加入本地快取 (Cache)，如果冇上過網/未入 Link，就用以下預設資料
        let defaultMaster = {
            "C": { "FILG04": ["FILGRASTIM (NIVESTIM) PREFILLED SYRINGE 30MU (300MCG)/0.5ML", "C1.A.1", "900"] },
            "L2PM": { "ABAC01": ["ABACAVIR (SULPHATE) TABLET 300MG", "F4A.2", "0"] },
            "SFI": { "ALTE01": ["ALTEPLASE (ACTILYSE) INJECTION 50MG", "A1D.1", "30"] }
        };
        let drugMaster = JSON.parse(localStorage.getItem('drugMasterCache')) || defaultMaster;

        const catColors = { "C": "#007bff", "L2PM": "#28a745", "SFI": "#fd7e14" };
        const catIcons = { "C": "❄️", "L2PM": "📦", "SFI": "💰" };
        const catOrder = { "C": 1, "L2PM": 2, "SFI": 3 };
        let records = [], pInventory = {}, mInventory = {}, excludedWatch = new Set();
        let currentCat = 'L2PM', watchThreshold = 0.5, isInventoryLoaded = false;
        let expandStates = { delivery: false, pending: false };
        let keypadTarget = null, keypadString = "0";

        function toggleMgmt() {
            const body = document.getElementById('mgmtBody');
            const icon = document.getElementById('mgmtIcon');
            const isCollapsed = body.classList.toggle('collapsed');
            icon.style.transform = isCollapsed ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function cleanId(id) { return id ? id.toString().replace(/\s+/g, '').toUpperCase() : ""; }
        
        function save() {
            const data = {
                records, pInventory, mInventory, excludedWatch: Array.from(excludedWatch), isInventoryLoaded, watchThreshold
            };
            localStorage.setItem('pWarehouseData', JSON.stringify(data));
        }

        window.onbeforeunload = function(e) { if (records.length > 0) { e.preventDefault(); e.returnValue = ''; } };
        document.addEventListener('visibilitychange', function() { if (document.visibilityState === 'hidden') save(); });
        window.addEventListener('pagehide', function() { save(); });

        window.onload = function() {
            const saved = localStorage.getItem('pWarehouseData') || localStorage.getItem('p_store_stable_v3');
            if (saved) {
                const d = JSON.parse(saved);
                records = d.records || [];
                pInventory = d.pInventory || {};
                mInventory = d.mInventory || {};
                excludedWatch = new Set(d.excludedWatch || []);
                isInventoryLoaded = d.isInventoryLoaded || false;
                watchThreshold = d.watchThreshold ?? 0.5;
                updateLabel('p'); updateLabel('m');
            }
            
            setThreshold(watchThreshold);
            renderTables();
            setCat(null); 
            
            // 嘗試在背景靜默更新雲端藥單
            updateCloudMaster(false);

            document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

            // PDA 實體掃描槍支援
            document.getElementById('drugId').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleIdInput();
                    if (this.value.trim() !== '' && !getDrugInfo(this.value)) {
                        showAlert("⚠️ 找不到對應的藥物代碼");
                        if(navigator.vibrate) navigator.vibrate([200, 100, 200]); // 加入小震動提示錯誤
                    }
                    this.blur();
                }
            });
        };

        // 💡 雲端同步核心功能
        function updateCloudMaster(showMsg = false) {
            if (!CLOUD_CSV_URL) {
                if(showMsg) showAlert("⚠️ 請先在程式碼最頂端填寫 Google Sheet 的 CLOUD_CSV_URL");
                return;
            }
            if(showMsg) showAlert("🔄 正在從雲端下載最新藥單，請稍候...");

            fetch(CLOUD_CSV_URL)
                .then(res => res.text())
                .then(csvText => {
                    const workbook = XLSX.read(csvText, { type: 'string' });
                    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                    
                    let newMaster = { "C": {}, "L2PM": {}, "SFI": {} };
                    
                    // 假設 Google Sheet 欄位：0:Item Code, 1:類別(C/L2PM/SFI), 2:藥名, 3:位置, 4:月用量, 5:包裝數
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row[0]) continue; 
                        const code = cleanId(row[0]);
                        const cat = (row[1] || "L2PM").toString().toUpperCase().trim();
                        const name = row[2] || "--";
                        const locator = row[3] || "--";
                        const usage = (row[4] || 0).toString();
                        const ps = (row[5] || 0).toString();
                        
                        if (newMaster[cat]) {
                            newMaster[cat][code] = [name, locator, usage, ps];
                        }
                    }
                    
                    drugMaster = newMaster;
                    localStorage.setItem('drugMasterCache', JSON.stringify(drugMaster)); 
                    renderTables();
                    
                    if(showMsg) {
                        const total = Object.keys(drugMaster.C).length + Object.keys(drugMaster.L2PM).length + Object.keys(drugMaster.SFI).length;
                        showAlert(`✅ 雲端藥單更新成功！\n共載入 ${total} 項藥物。`);
                    }
                })
                .catch(err => {
                    console.error("雲端更新失敗", err);
                    if(showMsg) showAlert("❌ 更新失敗，請檢查網絡連線或 CSV 連結是否正確。");
                });
        }

        function openKeypad(target) {
            keypadTarget = target;
            let currentVal = "";
            if(target === 'main') currentVal = document.getElementById('qty').value;
            else if (typeof target === 'string' && target.startsWith('watch-qty-')) currentVal = document.getElementById(target).value;
            else { const r = records.find(i => i.ts === target); if(r) currentVal = r.qty.toString(); }
            
            keypadString = (currentVal === "" || currentVal === "0") ? "0" : currentVal.toString();
            updateKeypadDisplay();

            const idVal = document.getElementById('drugId').value;
            const matched = getDrugInfo(idVal);
            const psBtn = document.getElementById('psBtn');
            const psHint = document.getElementById('psHint');

            let foundPS = 0;
            if (matched) { foundPS = matched.ps || (matched.info && matched.info[3]) || 0; }

            if (foundPS > 0) {
                currentPS = foundPS; 
                if(psBtn) { psBtn.style.opacity = "1"; psBtn.style.pointerEvents = "auto"; psBtn.classList.remove('opacity-30', 'pointer-events-none'); }
                if(psHint) { psHint.innerText = `包裝: ${currentPS}`; psHint.classList.remove('hidden'); }
            } else {
                currentPS = 0;
                if(psBtn) { psBtn.style.opacity = "0.3"; psBtn.style.pointerEvents = "none"; }
                if(psHint) psHint.classList.add('hidden');
            }
            
            document.getElementById('overlay').style.display = 'block';
            setTimeout(() => document.getElementById('numKeypad').classList.add('show'), 10);
        }

        function getDrugInfo(id) {
            if (!id) return null;
            const tid = cleanId(id);
            for (let cat in drugMaster) {
                for (let key in drugMaster[cat]) {
                    if (cleanId(key) === tid) {
                        const infoData = drugMaster[cat][key];
                        return { originalId: key, cat: cat, info: infoData, ps: infoData[3] || 0 };
                    }
                }
            }
            return null;
        }

        function closeKeypad() {
            document.getElementById('numKeypad').classList.remove('show');
            setTimeout(() => { if(!document.getElementById('numKeypad').classList.contains('show')) { if(document.getElementById('customAlert').style.display !== 'block') document.getElementById('overlay').style.display = 'none'; } }, 250);
            keypadTarget = null;
        }

        function updateKeypadDisplay() { document.getElementById('keypadDisplay').innerText = keypadString; }
        
        function pressKey(key) {
            if (key === 'C') keypadString = "0";
            else if (key === 'Backspace') keypadString = keypadString.length > 1 ? keypadString.slice(0, -1) : "0";
            else { if (keypadString === "0" && !isNaN(key)) keypadString = key; else keypadString += key; }
            updateKeypadDisplay();
        }

        function confirmKeypad() {
            try {
                const result = eval(keypadString.replace(/×/g, '*'));
                const finalVal = parseFloat(result.toFixed(2));
                if(keypadTarget === 'main') { document.getElementById('qty').value = finalVal; handleQtyChange(); }
                else if (typeof keypadTarget === 'string' && keypadTarget.startsWith('watch-qty-')) document.getElementById(keypadTarget).value = finalVal;
                else updateQty(keypadTarget, finalVal);
                closeKeypad();
            } catch (e) {
                keypadString = "Error"; updateKeypadDisplay();
                setTimeout(() => { keypadString = "0"; updateKeypadDisplay(); }, 800);
            }
        }

        function usePackSize() { if (currentPS > 0) { keypadString = currentPS.toString(); updateKeypadDisplay(); } }
        function closeAllModals() { closeAlert(); closeKeypad(); }

        function renderTables() {
            const existingInDelivery = new Set(records.filter(r => r.type === 'delivery').map(r => cleanId(r.id)));
            let watchList = [];
            
            if (isInventoryLoaded) {
                for (let c in drugMaster) {
                    for (let id in drugMaster[c]) {
                        const cid = cleanId(id);
                        if (existingInDelivery.has(cid) || excludedWatch.has(cid)) continue;
                        const info = drugMaster[c][id], monthly = parseFloat(info[2]), onHand = pInventory[cid] ?? 0;
                        let show = false;
                        if (watchThreshold === 'ALL_C') { if (c === 'C') show = true; }
                        else if (watchThreshold === 'ALL_SFI') { if (c === 'SFI') show = true; }
                        else { if (c === 'L2PM' && monthly > 0 && (onHand / monthly) <= watchThreshold) show = true; }
                        if (show) watchList.push({ id, cat: c, name: info[0], locator: info[1], monthly, onHand, ratio: (onHand/monthly).toFixed(2) });
                    }
                }
            }
            
            watchList.sort((a, b) => (catOrder[a.cat] - catOrder[b.cat]) || (getLocatorWeight(a.cat, a.locator) - getLocatorWeight(b.cat, b.locator)));

            requestAnimationFrame(() => {
                ['delivery', 'pending', 'watch'].forEach(t => {
                    const tbody = document.querySelector(`#table-${t} tbody`);
                    let items = t === 'watch' ? watchList : records.filter(r => r.type === t);
                    document.getElementById(`count-${t}`).innerText = items.length;
                    
                    if (t === 'watch') {
                        const watchExpandCont = document.getElementById('watch-expand-container');
                        const watchExpandText = document.getElementById('watch-expand-text');
                        if (items.length > 10) {
                            if(watchExpandCont) watchExpandCont.classList.remove('hidden');
                            if(watchExpandText) watchExpandText.innerText = isWatchlistExpanded ? "收起清單 △" : `展開全部 (${items.length}) ▽`;
                            if (!isWatchlistExpanded) items = items.slice(0, 10);
                        } else {
                            if(watchExpandCont) watchExpandCont.classList.add('hidden');
                        }
                    } else if ((t === 'delivery' || t === 'pending') && items.length > 3) {
                        const btnWrap = document.getElementById(`${t}-expand-btn`);
                        if(btnWrap) btnWrap.classList.remove('hidden');
                        const btnExpand = document.getElementById(`btn-expand-${t}`);
                        if(btnExpand) btnExpand.innerText = expandStates[t] ? "收起 △" : `展開 (${items.length}) ▽`;
                        if (!expandStates[t]) items = items.slice(0, 3);
                    } else if (t !== 'watch') {
                        const eb = document.getElementById(`${t}-expand-btn`);
                        if(eb) eb.classList.add('hidden');
                    }

                    const htmlRows = items.map(r => {
                        const cid = cleanId(r.id), pS = pInventory[cid] ?? (isInventoryLoaded ? 0 : '--'), mS = mInventory[cid] ?? (isInventoryLoaded ? 0 : '--');
                        const usage = r.usage || (r.monthly) || '0', isS = isInventoryLoaded && parseFloat(r.qty) > parseFloat(mS);
                        
                        if (t === 'watch') {
                            const ratioTag = `<span class="bg-red-100 text-red-600 px-1 rounded font-bold ml-1 text-[9px]">${r.ratio}x</span>`;
                            return `<tr class="bg-white/40">
                                <td class="p-2 text-center w-8">${catIcons[r.cat]}</td>
                                <td class="p-2">
                                    <div class="font-bold leading-tight text-gray-800 mb-1 text-[12px]">${r.name}</div>
                                    <div class="flex flex-col gap-1">
                                        <div class="flex items-center gap-1">
                                            <span class="item-code-badge">${r.id}</span>
                                            <span class="watch-locator-badge">📍 ${r.locator}</span>
                                        </div>
                                        <div class="flex flex-wrap items-center gap-2">
                                            <span class="text-[9px] font-bold text-blue-700">📊 ${usage}</span>
                                            <span class="text-[9px] font-bold text-emerald-600">🗑️ ${pS}</span>
                                            <span class="text-[9px] font-bold text-purple-600">🏥 ${mS}</span>
                                            ${ratioTag}${isS ? '<span class="text-red-600 font-black text-[9px]">!缺</span>' : ''}
                                        </div>
                                    </div>
                                </td>
                                <td class="p-2 text-right w-44"> <div class="flex gap-1 justify-end items-center">
                                        <input type="text" id="watch-qty-${cid}" readonly onclick="openKeypad('watch-qty-${cid}')" placeholder="0" class="w-10 h-7 text-center font-bold bg-white border border-red-200 rounded text-[10px] outline-none">
                                        <button onclick="addEntry('delivery','${r.id}', document.getElementById('watch-qty-${cid}').value)" class="bg-red-500 text-white px-2 h-7 rounded text-[9px] font-bold active:bg-red-300">出貨</button>
                                        <button onclick="addEntry('pending','${r.id}', 0)" class="bg-yellow-500 text-white px-2 h-7 rounded text-[9px] font-bold active:bg-yellow-600 ml-1">⏳ </button>
                                        <button onclick="delWatch('${r.id}')" class="text-gray-500 ml-1"><i class="icon-trash"></i></button>
                                    </div>
                                </td>
                            </tr>`;
                        }
                        return `<tr><td class="p-2 text-center w-8">${catIcons[r.cat]}</td><td class="p-2"><div class="font-bold text-[12px] leading-tight text-gray-800 mb-1">${r.name}</div><div class="flex items-center gap-2"><span class="item-code-badge">${r.id}</span><div class="flex flex-wrap gap-2 text-[8px] font-bold"><span class="text-blue-500">📍 ${r.locator}</span><span class="text-blue-700">📊 ${usage}</span><span class="text-emerald-600">🗑️ ${pS}</span><span class="text-purple-600">🏥 ${mS}</span>${isS ? '<span class="text-red-500 font-black">!缺</span>' : ''}</div></div></td><td class="p-2 w-16"><input type="text" readonly onclick="openKeypad(${r.ts})" value="${r.qty}" class="w-full text-center font-bold bg-white border border-gray-200 rounded-lg ${isS ? 'text-red-600 border-red-200' : ''}"></td><td class="p-2 text-center w-10"><div class="flex flex-col items-center gap-2">${t === 'pending' ? `<button onclick="move(${r.ts})" class="text-green-600"><i class="icon-check"></i></button>` : ''}<button onclick="delEntry(${r.ts})" class="text-red-300"><i class="icon-trash"></i></button></div></td></tr>`;
                    }).join('');
                    
                    tbody.innerHTML = htmlRows || `<tr><td colspan="4" class="p-4 text-center text-gray-300 text-[10px] italic">目前無項目</td></tr>`;
                });
            });
        }

        function getLocatorWeight(cat, locator) {
            const loc = (locator || "").toUpperCase();
            if (cat === 'C') { if (loc.startsWith('R8')) return 10; if (loc.startsWith('R1')) return 20; if (loc.startsWith('R2')) return 30; if (loc.startsWith('R3')) return 40; if (loc.startsWith('C')) return 50; }
            else if (cat === 'SFI') { if (/^[A-G]/.test(loc)) return 10; if (loc.startsWith('M')) return 20; if (loc.startsWith('R7')) return 30; if (loc.startsWith('R6')) return 40; if (loc.startsWith('R9')) return 50; }
            return 99;
        }

        function processExcel(input, type) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result), workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 }), tempInv = {};
                rows.forEach(row => {
                    const code = cleanId(row[0]), qty = parseFloat(row[1]);
                    if (code && code !== "ITEMCODE") tempInv[code] = isNaN(qty) ? 0 : qty;
                });
                if (type === 'p') { pInventory = tempInv; isInventoryLoaded = true; } else { mInventory = tempInv; }
                renderTables(); save(); updateLabel(type); updateMatchedUI();
            };
            reader.readAsArrayBuffer(file);
        }

        function handleIdInput() {
            const inputEl = document.getElementById('drugId');
            const clearBtn = document.getElementById('clearIdBtn');
            if (inputEl.value.length > 0) clearBtn.classList.remove('hidden'); else clearBtn.classList.add('hidden');
            const matched = getDrugInfo(inputEl.value);
            if (!inputEl.value.trim() || !matched) setCat(null); else setCat(matched.cat);
            updateMatchedUI();
        }

        function clearItemCode() {
            const input = document.getElementById('drugId');
            input.value = ""; input.focus(); document.getElementById('clearIdBtn').classList.add('hidden'); 
            setCat(null); updateMatchedUI();             
        }

        function updateMatchedUI() {
            const idInput = document.getElementById('drugId').value, matched = getDrugInfo(idInput);
            const box = document.getElementById('drugInfoBox'), content = document.getElementById('drugInfoContent');
            if (matched) {
                const cid = cleanId(matched.originalId), p = pInventory[cid] ?? (isInventoryLoaded ? 0 : '--'), m = mInventory[cid] ?? (isInventoryLoaded ? 0 : '--');
                const hasPack = matched.info.length > 3 && matched.info[3] !== "0", packText = hasPack ? matched.info[3].split(' ')[0] : "";
                box.style.borderTopColor = catColors[matched.cat];
                content.innerHTML = `<div class="w-full flex flex-col items-center animate-in fade-in duration-300"><div class="font-black text-[#1e40af] text-[18px] leading-tight text-center mb-3 w-full">${matched.info[0]}</div><div class="w-full space-y-2"><div class="grid ${hasPack ? 'grid-cols-2' : 'grid-cols-1'} gap-2 px-1">${hasPack ? `<div class="bg-white p-2 rounded-lg border border-gray-100 flex items-center justify-center gap-2"><span class="text-[12px]">📤</span><span class="text-[12px] font-black text-gray-500">${packText}</span></div>` : ''}<div class="bg-white p-2 rounded-lg border border-gray-100 flex items-center justify-center gap-2"><span class="text-[12px]">📍</span><span class="text-[14px] font-black text-blue-600">${matched.info[1]}</span></div></div><div class="grid grid-cols-3 gap-2 px-1"><div class="bg-blue-50/50 p-2 rounded-lg border border-blue-100 flex flex-col items-center"><span class="text-[10px] text-blue-500 font-bold">📊 用量</span><span class="text-[18px] font-black text-blue-700">${matched.info[2]}</span></div><div class="bg-white p-2 rounded-lg border border-gray-100 flex flex-col items-center"><span class="text-[10px] text-gray-400 font-bold">🗑️ P倉</span><span class="text-[18px] font-black text-emerald-600">${p}</span></div><div class="bg-white p-2 rounded-lg border border-gray-100 flex flex-col items-center"><span class="text-[10px] text-gray-400 font-bold">🏥 Main</span><span class="text-[18px] font-black text-purple-600">${m}</span></div></div></div></div>`;
            } else { box.style.borderTopColor = "#e5e7eb"; content.innerHTML = `<div class="opacity-40 italic text-[11px] text-gray-400">${idInput ? '⚠️ 找不到藥物' : '等待輸入代碼...'}</div>`; }
        }

        function addEntry(type, customId = null, customQty = null) {
            const idVal = customId || document.getElementById('drugId').value, matched = getDrugInfo(idVal);
            if (!matched && !customId) return;
            const qtyVal = parseFloat(customQty !== null ? (customQty || 0) : document.getElementById('qty').value);
            if (type === 'delivery' && (isNaN(qtyVal) || qtyVal <= 0)) { showAlert("⚠️ 請輸入有效數量！"); return; }
            const idToSave = matched ? matched.originalId : idVal.toUpperCase();
            const cid = cleanId(idToSave);
            excludedWatch.add(cid); 

            if (type === 'delivery') {
                const idx = records.findIndex(r => cleanId(r.id) === cid && r.type === 'delivery');
                if (idx !== -1) { 
                    if (qtyVal > records[idx].qty) {
                        const oldQty = records[idx].qty; records[idx].qty = qtyVal; 
                        showAlert(`已更新：${idToSave}\n由 ${oldQty} 改為最大值 ${qtyVal}`);
                    } else { showAlert(`提示：清單已有 ${idToSave}\n現有數量 ${records[idx].qty} 較大，維持不變。`); }
                } else { records.unshift({ type, cat: matched ? matched.cat : currentCat, id: idToSave, name: matched ? matched.info[0] : "手動項目", locator: matched ? matched.info[1] : "--", usage: matched ? matched.info[2] : "0", qty: qtyVal, ts: Date.now() }); }
            } else { records.unshift({ type: 'pending', cat: matched ? matched.cat : currentCat, id: idToSave, name: matched ? matched.info[0] : "手動項目", locator: matched ? matched.info[1] : "--", usage: matched ? matched.info[2] : "0", qty: qtyVal || 0, ts: Date.now() }); }

            if (!customId) { document.getElementById('drugId').value = ""; document.getElementById('qty').value = ""; setCat(null); updateMatchedUI(); }
            renderTables(); save();
        }

        function delWatch(id) { excludedWatch.add(cleanId(id)); renderTables(); save(); }
        function delEntry(ts) { records = records.filter(r => r.ts !== ts); renderTables(); save(); }
        
        function move(ts) { 
            const r = records.find(i => i.ts === ts); 
            if (r) {
                if (parseFloat(r.qty) <= 0) { showAlert("⚠️ 請先輸入數量！"); return; }
                const cid = cleanId(r.id), deliveryIdx = records.findIndex(rec => cleanId(rec.id) === cid && rec.type === 'delivery');
                if (deliveryIdx !== -1) {
                    const oldQty = parseFloat(records[deliveryIdx].qty), newQty = parseFloat(r.qty);
                    if (newQty > oldQty) { records[deliveryIdx].qty = newQty; showAlert(`已更新出貨清單：${r.id}\n由 ${oldQty} 改為最大值 ${newQty}`); } 
                    else { showAlert(`提示：出貨清單已有 ${r.id}\n現有數量 ${oldQty} 較大，維持不變。`); }
                    records = records.filter(i => i.ts !== ts);
                } else { r.type = 'delivery'; records = records.filter(i => i.ts !== ts); records.unshift(r); }
                excludedWatch.add(cid); renderTables(); save(); 
            } 
        }

        function updateQty(ts, val) { const r = records.find(i => i.ts === ts); if (r) { r.qty = val; renderTables(); save(); } }
        
        function setCat(cat) { currentCat = cat; ['C', 'L2PM', 'SFI'].forEach(c => { const el = document.getElementById(`tab-${c}`); if (el) el.classList.toggle(`tab-active-${c}`, c === cat); }); }
        
        function setThreshold(val) { watchThreshold = val; [0.1, 0.4, 0.5, 0.7, 'ALL_C', 'ALL_SFI'].forEach(v => { const btn = document.getElementById(`btn-t-${v}`); if (btn) btn.className = v === val ? "flex-1 py-1.5 text-[10px] rounded-lg filter-btn-active" : "flex-1 py-1.5 text-[10px] rounded-lg bg-red-800/40 text-white"; }); renderTables(); save(); }

        function toggleExpand(type) { expandStates[type] = !expandStates[type]; renderTables(); }

        function handleQtyChange() { const id = cleanId(document.getElementById('drugId').value), qty = parseFloat(document.getElementById('qty').value || 0), mStock = mInventory[id] || 0; document.getElementById('mainStockWarning').classList.toggle('hidden', !(id && isInventoryLoaded && qty > mStock)); }

        function showAlert(msg, onConfirm = null) { document.getElementById('alertMsg').innerText = msg; document.getElementById('overlay').style.display = 'block'; document.getElementById('customAlert').style.display = 'block'; const btn = document.getElementById('alertConfirmBtn'); if (onConfirm) { document.getElementById('alertCancelBtn').classList.remove('hidden'); btn.onclick = () => { onConfirm(); closeAlert(); }; } else { document.getElementById('alertCancelBtn').classList.add('hidden'); btn.onclick = closeAlert; } }

        function closeAlert() { document.getElementById('customAlert').style.display = 'none'; if(!keypadTarget) document.getElementById('overlay').style.display = 'none'; }
        
        function updateLabel(type) { const count = Object.keys(type === 'p' ? pInventory : mInventory).length; document.getElementById(type + 'Label').innerText = count > 0 ? `已載入 ${count} 項` : '未載入'; }
        
        function confirmClearAll() { showAlert("⚠️ 注意：這將清空所有資料！", () => { records = []; pInventory = {}; mInventory = {}; excludedWatch = new Set(); isInventoryLoaded = false; updateLabel('p'); updateLabel('m'); renderTables(); save(); localStorage.clear(); }); }
        function confirmClearPending() { const pendingCount = records.filter(r => r.type === 'pending').length; if (pendingCount === 0) return showAlert("待查機清單是空的。"); showAlert(`⚠️ 確定要清空這 ${pendingCount} 項待查機紀錄嗎？`, () => { records = records.filter(r => r.type !== 'pending'); renderTables(); save(); }); }
        function confirmClearDelivery() { const deliveryCount = records.filter(r => r.type === 'delivery').length; if (deliveryCount === 0) return showAlert("出貨清單是空的。"); showAlert(`⚠️ 確定要清空這 ${deliveryCount} 項出貨紀錄嗎？`, () => { records = records.filter(r => r.type !== 'delivery'); excludedWatch = new Set(); renderTables(); save(); }); }

        function exportExcel() {
            const deliveryItems = records.filter(r => r.type === 'delivery');
            const pendingItems = records.filter(r => r.type === 'pending');
            if (deliveryItems.length === 0 && pendingItems.length === 0) return showAlert("❌ 冇任何資料可以匯出 (出貨及待查清單均為空)");

            const now = new Date(), y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
            const timeStr = now.toTimeString().split(' ')[0]; // 獲取時間 HH:MM:SS
            const dateStr = `${y}/${m}/${d}`;

            let wsData = [["", "", dateStr, timeStr]]; // 💡 匯出 Excel 增加時間戳

            if (deliveryItems.length > 0) {
                wsData.push(["出貨 Item Code", "Qty"]);
                deliveryItems.forEach(r => wsData.push([r.id, r.qty]));
            }

            if (pendingItems.length > 0) {
                if (deliveryItems.length > 0) wsData.push(["", ""]); 
                wsData.push(["待查 Item Code", "Qty"]); 
                pendingItems.forEach(r => { let displayQty = r.qty > 0 ? r.qty : ""; wsData.push([r.id, displayQty]); });
            }

            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "P倉紀錄");
            XLSX.writeFile(wb, `P倉紀錄_${y}-${m}-${d}.xlsx`);
        }

        function toggleWatchlist() { isWatchlistExpanded = !isWatchlistExpanded; renderTables(); }
    </script>
</body>
</html>
